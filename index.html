<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Object Detection</title>
<style>
body { font-family: Arial, sans-serif; text-align: center; background: linear-gradient(135deg, #6a5acd, #836fff); color: white; padding-top: 50px; }
.custom-file-upload { display: inline-block; padding: 10px 16px; background: #28a745; color: white; border-radius: 6px; cursor: pointer; margin: 5px; border: none; }
a { display: block; margin: 10px auto; padding: 10px 16px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; width: 220px; }
#progress { margin-top: 15px; }
</style>
</head>
<body>
<h1>Object Detection</h1>

<form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
<label for="file-upload" class="custom-file-upload">Upload Video</label>
<input id="file-upload" type="file" name="file" accept="video/*" style="display:none;">

<label for="photo-upload" class="custom-file-upload">Upload Photo</label>
<input id="photo-upload" type="file" name="photo" accept="image/*" style="display:none;">

<input type="submit" value="Submit" class="custom-file-upload">
<div id="progress">
<progress id="progressBar" value="0" max="100"></progress>
<span id="status"></span>
</div>
</form>

<a id="startWebcam" href="/start_webcam">Start Webcam Detection</a>
<a id="startExternalWebcam" href="/start_external_webcam">Start External Webcam</a>
<a id="startMoneyDetection" href="/start_money_detection">Start Money Detection</a>

<script>
document.getElementById('uploadForm').addEventListener('submit', function (e) {
  e.preventDefault();

  const formData = new FormData(this);
  const xhr = new XMLHttpRequest();

  xhr.upload.addEventListener('progress', function (event) {
    if (event.lengthComputable) {
      const percent = (event.loaded / event.total) * 100;
      document.getElementById('progressBar').value = percent;
      document.getElementById('status').innerText = `${Math.round(percent)}%`;
    }
  });

  xhr.addEventListener('load', function () {
    if (xhr.status === 200) {
      window.location.href = xhr.responseURL;
    } else {
      alert('Upload failed');
    }
  });

  xhr.addEventListener('error', function () {
    alert('Upload failed due to an error');
  });

  xhr.open('POST', '/upload', true);
  xhr.send(formData);

  document.getElementById('progress').style.display = 'block';
});
</script>
</body>
</html>
